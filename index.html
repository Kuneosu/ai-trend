<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI TREND - AI 트렌드를 한눈에</title>
<meta name="description" content="AI 트렌드를 한눈에. 월·수·금 업데이트되는 큐레이션 AI 뉴스 다이제스트.">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif; color: #333; background: #fff; line-height: 1.7; -webkit-font-smoothing: antialiased; }
a { color: #333; text-decoration: none; }
a:hover { color: #2563eb; }

.layout { display: flex; min-height: 100vh; }

/* ── Sidebar ── */
.sidebar { width: 240px; background: #fafafa; border-right: 1px solid #eee; padding: 32px 20px; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; z-index: 100; }
.sidebar-title { font-size: 14px; font-weight: 800; color: #111; letter-spacing: 1px; margin-bottom: 4px; }
.sidebar-tagline { font-size: 11px; color: #999; margin-bottom: 24px; }

.nav-section { margin-bottom: 24px; }
.nav-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #bbb; margin-bottom: 8px; }
.nav-list { list-style: none; }
.nav-list li { margin-bottom: 2px; }
.nav-list li a,
.nav-list li button { display: block; font-size: 13px; color: #666; padding: 4px 10px; border-radius: 4px; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-family: inherit; line-height: 1.7; }
.nav-list li a:hover,
.nav-list li button:hover { background: #f0f0f0; color: #333; }
.nav-list li a.active,
.nav-list li button.active { background: #e8f0fe; color: #2563eb; font-weight: 500; }
.nav-count { font-size: 11px; color: #ccc; float: right; }

.sidebar-footer { font-size: 11px; color: #ccc; margin-top: auto; padding-top: 16px; border-top: 1px solid #eee; }

/* ── Main content ── */
.main { flex: 1; margin-left: 240px; padding: 32px 40px; max-width: 960px; }

.page-header { margin-bottom: 32px; }
.page-title { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 4px; }
.page-date { font-size: 14px; color: #666; }

/* ── Article card ── */
.article { margin-bottom: 24px; padding: 20px; border: 1px solid #f0f0f0; border-radius: 8px; background: #fff; }
.article:hover { border-color: #e0e0e0; }

.article-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.tag { font-size: 11px; font-weight: 500; color: #2563eb; background: #eff6ff; padding: 2px 8px; border-radius: 3px; }
.date { font-size: 12px; color: #999; }

.article-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
.article-title { font-size: 17px; font-weight: 700; color: #111; line-height: 1.4; cursor: pointer; flex: 1; }
.article-title:hover { color: #2563eb; }

.bookmark-btn { background: none; border: none; font-size: 12px; color: #ccc; cursor: pointer; padding: 2px 6px; white-space: nowrap; flex-shrink: 0; }
.bookmark-btn:hover { color: #2563eb; }
.bookmark-btn.active { color: #2563eb; }

.article-summary { font-size: 15px; color: #444; margin-bottom: 0; line-height: 1.6; }

/* ── Accordion importance ── */
.article-detail { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
.article.expanded .article-detail { max-height: 500px; }

.importance { font-size: 14px; color: #333; background: #fafafa; padding: 12px 16px; border-left: 3px solid #e5e5e5; border-radius: 0 4px 4px 0; margin-top: 12px; margin-bottom: 8px; }
.importance strong { font-weight: 600; color: #111; display: block; margin-bottom: 6px; }
.importance ul { list-style: none; padding: 0; margin: 0; }
.importance ul li { position: relative; padding-left: 14px; margin-bottom: 4px; line-height: 1.7; }
.importance ul li::before { content: '·'; position: absolute; left: 0; font-weight: 700; color: #2563eb; }

.source { font-size: 13px; color: #888; margin-top: 8px; }
.source a { color: #666; }
.source a:hover { color: #2563eb; }

/* ── Loading / Error ── */
.loading { text-align: center; padding: 60px 0; color: #999; font-size: 14px; }
.loading-spinner { display: inline-block; width: 24px; height: 24px; border: 2.5px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { text-align: center; padding: 60px 20px; color: #999; font-size: 14px; }
.empty-state { text-align: center; padding: 48px 20px; color: #bbb; font-size: 14px; }

/* ── Footer ── */
.main-footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #f0f0f0; font-size: 12px; color: #ccc; }

/* ── Mobile hamburger ── */
.hamburger { display: none; position: fixed; top: 12px; left: 12px; z-index: 200; background: #fff; border: 1px solid #eee; border-radius: 6px; width: 36px; height: 36px; font-size: 18px; cursor: pointer; align-items: center; justify-content: center; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 90; }
.overlay.show { display: block; }

/* ── Mobile ── */
@media (max-width: 768px) {
  .hamburger { display: flex; }
  .sidebar { transform: translateX(-100%); transition: transform 0.25s ease; }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; padding: 60px 16px 24px; }
}

/* ── Print ── */
@media print {
  .sidebar, .hamburger, .overlay, .bookmark-btn { display: none !important; }
  .main { margin-left: 0; padding: 0; }
  .article-detail { max-height: none !important; }
  .article { break-inside: avoid; }
}
</style>
</head>
<body>

<button class="hamburger" id="hamburger" aria-label="메뉴 열기">☰</button>
<div class="overlay" id="overlay"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">AI TREND</div>
    <div class="sidebar-tagline">AI 트렌드를 한눈에</div>

    <div class="nav-section">
      <div class="nav-label">날짜</div>
      <ul class="nav-list" id="dateNav">
        <li><button class="active" data-filter="all">전체</button></li>
      </ul>
    </div>

    <div class="nav-section">
      <div class="nav-label">카테고리</div>
      <ul class="nav-list" id="tagNav"></ul>
    </div>

    <div class="nav-section">
      <div class="nav-label">필터</div>
      <ul class="nav-list">
        <li><button data-filter="top">⭐ Top News</button></li>
        <li><button data-filter="bookmark">저장한 글</button></li>
      </ul>
    </div>

    <div class="sidebar-footer">
      주 3회 업데이트<br>월·수·금
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <h1 class="page-title">오늘의 AI 트렌드</h1>
      <p class="page-date" id="pageDate"></p>
    </div>

    <div id="articleList">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div>기사를 불러오는 중...</div>
      </div>
    </div>

    <div class="main-footer" id="mainFooter"></div>
  </main>
</div>

<script>
const SUPABASE_URL = 'https://jfvbskitksjvyxrdfnap.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmdmJza2l0a3Nqdnl4cmRmbmFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzQ2ODYsImV4cCI6MjA5MDE1MDY4Nn0.oKRNHGnAL2MDxhrQY7RABGHCsZxsa5hoj3Cu-mO_Bvo';
const BOOKMARK_KEY = 'ai-trend-bookmarks';

let allArticles = [];
let currentFilter = 'all';

// ── Bookmarks ──
function getBookmarks() {
  return JSON.parse(localStorage.getItem(BOOKMARK_KEY) || '[]');
}

function toggleBookmark(id) {
  const bookmarks = getBookmarks();
  const idx = bookmarks.indexOf(id);
  if (idx === -1) bookmarks.push(id);
  else bookmarks.splice(idx, 1);
  localStorage.setItem(BOOKMARK_KEY, JSON.stringify(bookmarks));
  render();
}

// ── Data ──
async function loadArticles() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/articles?select=*&order=date.desc,created_at.desc`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`
    }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── Helpers ──
function escapeHtml(text) {
  const el = document.createElement('span');
  el.textContent = text;
  return el.innerHTML;
}

function formatImportance(text) {
  // Split by sentence-ending patterns (. followed by space/newline, or explicit line breaks)
  const sentences = text.split(/(?<=\.)\s+/).filter(s => s.trim());
  if (sentences.length <= 1) return '<ul><li>' + escapeHtml(text) + '</li></ul>';
  return '<ul>' + sentences.map(s => '<li>' + escapeHtml(s.trim()) + '</li>').join('') + '</ul>';
}

function formatDateShort(d) {
  if (!d) return '';
  return d; // already YYYY-MM-DD
}

function getDayName(d) {
  if (!d) return '';
  const date = new Date(d + 'T00:00:00');
  const days = ['일', '월', '화', '수', '목', '금', '토'];
  return days[date.getDay()];
}

function formatFullDate(d) {
  const date = new Date(d);
  const days = ['일', '월', '화', '수', '목', '금', '토'];
  return `${date.getFullYear()}년 ${date.getMonth() + 1}월 ${date.getDate()}일 ${days[date.getDay()]}요일 · `;
}

// ── Build sidebar nav dynamically ──
function buildSidebarNav() {
  // Date nav
  const dateNav = document.getElementById('dateNav');
  const dateCounts = {};
  allArticles.forEach(a => {
    if (a.date) {
      dateCounts[a.date] = (dateCounts[a.date] || 0) + 1;
    }
  });
  const dates = Object.keys(dateCounts).sort().reverse();

  let dateHtml = `<li><button class="${currentFilter === 'all' ? 'active' : ''}" data-filter="all">전체 <span class="nav-count">${allArticles.length}</span></button></li>`;
  dates.forEach(d => {
    const dayName = getDayName(d);
    const filterKey = `date:${d}`;
    dateHtml += `<li><button class="${currentFilter === filterKey ? 'active' : ''}" data-filter="${filterKey}">${d} (${dayName}) <span class="nav-count">${dateCounts[d]}</span></button></li>`;
  });
  dateNav.innerHTML = dateHtml;

  // Tag nav
  const tagNav = document.getElementById('tagNav');
  const tagCounts = {};
  allArticles.forEach(a => {
    if (a.tag) {
      tagCounts[a.tag] = (tagCounts[a.tag] || 0) + 1;
    }
  });
  const tags = Object.keys(tagCounts).sort();

  let tagHtml = '';
  tags.forEach(t => {
    const filterKey = `tag:${t}`;
    tagHtml += `<li><button class="${currentFilter === filterKey ? 'active' : ''}" data-filter="${filterKey}">${t} <span class="nav-count">${tagCounts[t]}</span></button></li>`;
  });
  tagNav.innerHTML = tagHtml;

  // Re-bind all nav buttons
  document.querySelectorAll('.nav-list button[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.filter;
      buildSidebarNav();
      render();
      // Close mobile sidebar
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    });
  });
}

// ── Filter ──
function getFilteredArticles() {
  const bookmarks = getBookmarks();
  if (currentFilter === 'all') return allArticles;
  if (currentFilter === 'top') return allArticles.filter(a => a.is_top);
  if (currentFilter === 'bookmark') return allArticles.filter(a => bookmarks.includes(a.id));
  if (currentFilter.startsWith('tag:')) {
    const tag = currentFilter.slice(4);
    return allArticles.filter(a => a.tag === tag);
  }
  if (currentFilter.startsWith('date:')) {
    const date = currentFilter.slice(5);
    return allArticles.filter(a => a.date === date);
  }
  return allArticles;
}

// ── Render article ──
function renderArticle(article) {
  const bookmarks = getBookmarks();
  const isBookmarked = bookmarks.includes(article.id);

  return `
    <div class="article" data-id="${article.id}">
      <div class="article-header">
        ${article.tag ? `<span class="tag">${escapeHtml(article.tag)}</span>` : ''}
        <span class="date">${formatDateShort(article.date)}</span>
      </div>
      <div class="article-title-row">
        <h2 class="article-title" onclick="toggleAccordion(this)">${escapeHtml(article.title)}</h2>
        <button class="bookmark-btn ${isBookmarked ? 'active' : ''}" onclick="toggleBookmark(${article.id})" title="저장">${isBookmarked ? '★ 저장됨' : '☆ 저장'}</button>
      </div>
      <p class="article-summary">${escapeHtml(article.summary || '')}</p>
      <div class="article-detail">
        <div class="importance"><strong>왜 중요한가</strong>${formatImportance(article.importance || '정보 없음')}</div>
        ${article.source_url ? `<div class="source">출처: <a href="${escapeHtml(article.source_url)}" target="_blank" rel="noopener">${escapeHtml(article.source || '원문')} →</a></div>` : (article.source ? `<div class="source">출처: ${escapeHtml(article.source)}</div>` : '')}
      </div>
    </div>`;
}

// ── Render all ──
function render() {
  const articles = getFilteredArticles();
  const listEl = document.getElementById('articleList');
  const dateEl = document.getElementById('pageDate');

  dateEl.textContent = formatFullDate(new Date()) + `${articles.length}건`;

  if (articles.length === 0) {
    const msg = currentFilter === 'bookmark' ? '저장한 기사가 없습니다' : '해당 기사가 없습니다';
    listEl.innerHTML = `<div class="empty-state">${msg}</div>`;
    return;
  }

  listEl.innerHTML = articles.map(a => renderArticle(a)).join('');
}

// ── Accordion ──
function toggleAccordion(titleEl) {
  const article = titleEl.closest('.article');
  article.classList.toggle('expanded');
}

// ── Mobile hamburger ──
document.getElementById('hamburger').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
});
document.getElementById('overlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
});

// ── Init ──
(async () => {
  try {
    allArticles = await loadArticles();
    buildSidebarNav();
    render();
  } catch (err) {
    console.error('Failed to load articles:', err);
    document.getElementById('articleList').innerHTML = `
      <div class="error-msg">
        기사를 불러오지 못했습니다.<br>
        <small style="color:#ccc">잠시 후 다시 시도해 주세요.</small>
      </div>`;
  }
})();
</script>
</body>
</html>
